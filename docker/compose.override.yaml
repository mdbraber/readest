services:
  client:
    image: nedworks/readest:latest
    pull_policy: always
    environment:
      SITE_URL: ${SITE_URL}
      # Supabase is routed through the same host via the external Caddy
      # (see Caddyfile.external.example) — no separate supabase subdomain needed.
      SUPABASE_PUBLIC_URL: ${SITE_URL}
      API_BASE_URL: ${SITE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    depends_on: !reset []

  kong:
    image: caddy:2-alpine
    container_name: supabase-kong
    restart: unless-stopped
    entrypoint: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    command: []
    ports:
      - "${KONG_HTTP_PORT}:8000/tcp"
    volumes: !override
      - ./caddy-internal/Caddyfile:/etc/caddy/Caddyfile:ro
    environment: !reset
      AUTH_HOST: ${AUTH_HOST:-auth}
      REST_HOST: ${REST_HOST:-rest}

  minio:
    profiles: ["disabled"]
  minio-setup:
    profiles: ["disabled"]
